name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: run_tests
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: postgres://user:password@localhost:5432/testdb
        run: |
          npm test
          echo "## Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Tests ran successfully! Coverage reports are available in the artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Test Failure Annotation
        if: failure() && steps.run_tests.outcome == 'failure'
        run: |
          echo "::error::Tests failed. Please check the workflow logs for details."
          echo "## Test Results :x:" >> $GITHUB_STEP_SUMMARY
          echo "Tests failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
