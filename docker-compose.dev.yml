services:
  neon-local:
    image: neondatabase/neon_local:latest
    env_file:
      - .env.development
    ports:
      - '5432:5432'
  app:
    build:
      context: .
      target: development
    env_file:
      - .env.development
    depends_on:
      - neon-local
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
